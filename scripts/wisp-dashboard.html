<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisp Dashboard</title>
<style>
:root {
  --bg: #1a1a2e; --surface: #16213e; --surface2: #0f3460;
  --text: #e0e0e0; --text2: #a0a0b0; --accent: #e94560;
  --green: #4ecca3; --warn: #f0a500; --border: #2a2a4a;
  --radius: 8px; --font: system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
/* Top bar */
#topbar { display: flex; align-items: center; gap: 16px; padding: 8px 16px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
#topbar h1 { font-size: 16px; color: var(--accent); }
#topbar .stat { font-size: 12px; color: var(--text2); }
#topbar .stat span { color: var(--text); font-weight: bold; }
#topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
#topbar .dot.offline { background: var(--accent); }
/* Main layout */
#main { display: flex; flex: 1; overflow: hidden; }
/* Left: session list */
#sidebar { width: 280px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#sidebar h3 { padding: 12px 16px 8px; font-size: 13px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
#sessionList { flex: 1; overflow-y: auto; padding: 0 8px; }
.sessionCard { padding: 10px 12px; margin-bottom: 6px; background: var(--surface2); border-radius: var(--radius); cursor: pointer; border: 1px solid transparent; transition: border-color 0.15s; }
.sessionCard:hover { border-color: var(--accent); }
.sessionCard.active { border-color: var(--accent); background: var(--surface2); box-shadow: 0 0 8px rgba(233,69,96,0.2); }
.sessionCard .userText { font-size: 13px; margin-bottom: 4px; line-height: 1.4; word-break: break-all; }
.sessionCard .meta { font-size: 11px; color: var(--text2); }
.sessionCard .status { font-size: 10px; padding: 1px 6px; border-radius: 4px; display: inline-block; margin-left: 6px; }
.sessionCard .status.pending { background: var(--warn); color: #000; }
.sessionCard .status.replying { background: var(--green); color: #000; }
.emptyState { padding: 24px 16px; text-align: center; color: var(--text2); font-size: 13px; }
/* Center: reply area */
#center { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
#replyHeader { padding: 16px 20px 8px; flex-shrink: 0; }
#replyHeader .requestId { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
#replyHeader .prompt { font-size: 14px; background: var(--surface); padding: 12px; border-radius: var(--radius); line-height: 1.5; word-break: break-all; max-height: 80px; overflow-y: auto; }
#replyArea { flex: 1; display: flex; flex-direction: column; padding: 12px 20px; overflow: hidden; }
#replyInput { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 12px; font-size: 14px; font-family: var(--font); resize: none; min-height: 80px; }
#replyInput:focus { outline: none; border-color: var(--accent); }
#stickerBar { display: flex; gap: 6px; padding: 8px 0; flex-wrap: wrap; overflow-y: auto; max-height: 100px; }
#stickerBar button { padding: 4px 10px; font-size: 11px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; white-space: nowrap; }
#stickerBar button:hover { border-color: var(--accent); background: var(--surface); }
#btnRow { display: flex; gap: 8px; padding: 8px 0; flex-shrink: 0; }
#btnRow button { padding: 8px 20px; font-size: 13px; border: none; border-radius: var(--radius); cursor: pointer; font-weight: bold; }
#btnRow .btnSend { background: var(--accent); color: #fff; }
#btnRow .btnSend:hover { opacity: 0.85; }
#btnRow .btnCancel { background: var(--surface2); color: var(--text); }
#btnRow .btnCancel:hover { background: #444; }
/* Right: panels */
#right { width: 260px; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 12px; flex-direction: column; display: flex; gap: 12px; }
#right h3 { font-size: 12px; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; }
.voiceItem { font-size: 11px; padding: 6px 8px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 4px; cursor: pointer; }
.voiceItem:hover { background: var(--accent); color: #fff; }
.voiceItem .vtext { font-size: 12px; margin-top: 2px; color: var(--text); }
#ttsPanel input, #ttsPanel select { width: 100%; padding: 6px 8px; font-size: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); margin-bottom: 6px; }
#ttsPanel button { width: 100%; padding: 6px; font-size: 12px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); cursor: pointer; }
#quickReplies { display: flex; flex-wrap: wrap; gap: 4px; }
#quickReplies button { font-size: 11px; padding: 4px 8px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }
#quickReplies button:hover { border-color: var(--accent); }
</style>
</head>
<body>
<div id="topbar">
  <div class="dot" id="wsDot"></div>
  <h1>Wisp Dashboard</h1>
  <div class="stat">待处理: <span id="statPending">0</span></div>
  <div class="stat">语音: <span id="statVoices">0</span></div>
  <div style="flex:1"></div>
  <div class="stat" id="ttsLabel" style="font-size:11px">🔊 ?</div>
  <div class="stat" id="wsStatus">连接中…</div>
</div>

<div id="main">
  <!-- Left sidebar -->
  <div id="sidebar">
    <h3>📱 待回复请求</h3>
    <div id="sessionList"><div class="emptyState">暂无请求</div></div>
    <div style="padding:4px 8px" id="dismissAllRow"><button style="width:100%;padding:4px;font-size:11px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:4px;cursor:pointer;display:none" id="btnDismissAll" onclick="dismissAll()">全部忽略</button></div>
    <div id="historySection" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
      <h3 style="cursor:pointer" onclick="document.getElementById('historyList').style.display = document.getElementById('historyList').style.display === 'none' ? 'block' : 'none';this.querySelector('span').textContent = document.getElementById('historyList').style.display === 'none' ? '▶' : '▼'">📋 已处理 <span>▶</span></h3>
      <div id="historyList" style="display:none;padding:0 8px"><div class="emptyState">暂无</div></div>
    </div>
  </div>

  <!-- Center -->
  <div id="center">
    <div id="replyHeader">
      <div class="requestId" id="selectedId">选择一个请求开始回复</div>
      <div class="prompt" id="selectedPrompt">👈 从左侧列表选择一条消息</div>
    </div>
    <div id="replyArea">
      <div id="stickerBar"></div>
      <textarea id="replyInput" placeholder="输入回复内容…Ctrl+Enter 发送" disabled></textarea>
      <div id="btnRow">
        <button class="btnSend" id="btnSend" disabled onclick="sendReply()">发送 (Ctrl+Enter)</button>
        <button class="btnCancel" id="btnCancel" disabled onclick="cancelReply()">跳过 / 取消</button>
        <button class="btnCancel" onclick="sendSticker()" id="btnSticker" disabled>📎 贴纸</button>
      </div>
    </div>
  </div>

  <!-- Right panels -->
  <div id="right">
    <div>
      <h3>⚡ 快捷回复</h3>
      <div id="quickReplies">
        <button onclick="quickReply('你好呀~')">你好呀~</button>
        <button onclick="quickReply('今天天气不错呢')">天气不错</button>
        <button onclick="quickReply('在忙什么呢？')">在忙什么</button>
        <button onclick="quickReply('好的，我知道了')">好的</button>
        <button onclick="quickReply('哈哈，有意思')">哈哈</button>
        <button onclick="quickReply('👍')">👍</button>
      </div>
    </div>
    <div>
      <h3>🔊 TTS 试听</h3>
      <div id="ttsPanel">
        <input id="ttsText" placeholder="输入试听文字…" value="你好，测试语音">
        <select id="ttsEngine"><option value="gptsovits">GPT-SoVITS</option><option value="qwen3">Qwen3-TTS</option></select>
        <button onclick="testTts()">▶ 试听</button>
      </div>
    </div>
    <div>
      <h3>🎙 语音收件箱</h3>
      <div id="voiceList"><div class="emptyState">暂无</div></div>
    </div>
  </div>
</div>

<audio id="audioPlayer" style="display:none" controls></audio>

<script>
const params = new URLSearchParams(location.search);
const WS_URL = `ws://${location.host}/dashboard/ws` + (params.get('token') ? `?token=${encodeURIComponent(params.get('token'))}` : '');
let ws, selectedSessionId = null, sendingReply = false;
let sessions = new Map();
let history = []; // completed sessions with result

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('wsDot').className = 'dot';
    document.getElementById('wsStatus').textContent = '已连接';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').className = 'dot offline';
    document.getElementById('wsStatus').textContent = '断开 — 3s后重连';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try { handleMsg(JSON.parse(e.data)); } catch {}
  };
}

function handleMsg(msg) {
  if (msg.type === 'init') {
    sessions.clear();
    for (const s of msg.sessions || []) sessions.set(s.requestId, s);
    renderSessions();
    renderStickers(msg.stickers || []);
    updateStats();
    const ttsLabel = document.getElementById('ttsLabel');
    const hasTts = msg.ttsProxy || false;
    ttsLabel.textContent = '🔊 ' + (hasTts ? '就绪' : '未配置');
    ttsLabel.style.color = hasTts ? 'var(--green)' : 'var(--text2)';
  }
  if (msg.type === 'session.new') {
    sessions.set(msg.session.requestId, msg.session);
    renderSessions();
    updateStats();
  }
  if (msg.type === 'session.updated') {
    sessions.set(msg.session.requestId, msg.session);
    renderSessions();
  }
  if (msg.type === 'session.completed') {
    const s = sessions.get(msg.requestId);
    if (s) {
      s.resolvedStatus = msg.status || 'completed';
      s.resolvedAt = Date.now();
      history.unshift(s);
      if (history.length > 50) history.pop();
    }
    sessions.delete(msg.requestId);
    if (selectedSessionId === msg.requestId) { sendingReply = false; deselectSession(); }
    renderSessions();
    renderHistory();
    updateStats();
    if (msg.status === 'timeout') showToast('⚠ 请求超时 (已自动跳过)');
    if (msg.status === 'cancelled') showToast('✕ 请求已取消');
  }
  if (msg.type === 'voice.new') {
    addVoiceItem(msg.voice);
    updateStats();
  }
  if (msg.type === 'tts.audio') {
    // Deprecated: TTS now uses HTTP proxy.
  }
  if (msg.type === 'cancelledAll') {
    showToast('已忽略 ' + msg.count + ' 个请求');
  }
  if (msg.type === 'error') {
    alert('错误: ' + (msg.message || '未知'));
  }
}

function renderSessions() {
  const list = document.getElementById('sessionList');
  const dismissBtn = document.getElementById('btnDismissAll');
  if (sessions.size === 0) {
    list.innerHTML = '<div class="emptyState">暂无待回复请求<br><small>等待手机发送消息…</small></div>';
    dismissBtn.style.display = 'none';
    return;
  }
  const pendingCount = [...sessions.values()].filter(s => s.status === 'pending').length;
  dismissBtn.style.display = pendingCount > 1 ? 'block' : 'none';
  const sorted = [...sessions.values()].sort((a, b) => b.createdAt - a.createdAt);
  list.innerHTML = sorted.map(s => {
    const age = Math.floor((Date.now() - s.createdAt) / 1000);
    const ageStr = age < 60 ? `${age}s` : `${Math.floor(age / 60)}m`;
    const imgTags = (s.userImages || []).map(id => `<img src="/api/v1/debug/images/${encodeURIComponent(id)}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;margin:2px">`).join('');
    const stickerTag = s.sticker ? `<img src="/api/v1/stickers/${encodeURIComponent(s.sticker.pack)}/${encodeURIComponent(s.sticker.file)}" style="width:48px;height:48px;object-fit:contain;margin:2px" title="${escHtml(s.sticker.tag)}">` : '';
    const label = s.userText || (imgTags ? '📷 图片消息' : stickerTag ? '🎭 贴纸' : '(空消息)');
    return `<div class="sessionCard ${s.requestId === selectedSessionId ? 'active' : ''}" onclick="selectSession('${s.requestId}')">
      <div class="userText">${escHtml(label)}</div>
      ${stickerTag ? `<div>${stickerTag}</div>` : ''}
      ${!stickerTag && imgTags ? `<div style="margin-top:4px">${imgTags}</div>` : ''}
      <div class="meta">${ageStr} 前 <span class="status ${s.status}">${s.status === 'pending' ? '待处理' : '回复中'}</span></div>
    </div>`;
  }).join('');
}

let stickerPacks = [];
function renderStickers(stickers) {
  stickerPacks = stickers;
  const bar = document.getElementById('stickerBar');
  const tags = [...new Set(stickers.flatMap(p => (p.tags || []).slice(0, 5)))].slice(0, 20);
  bar.innerHTML = tags.map(t => `<button onclick="sendSticker('${escHtml(t)}')">${escHtml(t)}</button>`).join('') || '<span style="font-size:11px;color:var(--text2)">无贴纸包</span>';
}

function selectSession(id) {
  selectedSessionId = id;
  const s = sessions.get(id);
  if (!s) return;
  document.getElementById('selectedId').textContent = id;
  const stickerHtml = s.sticker ? `<div style="margin-top:8px"><img src="/api/v1/stickers/${encodeURIComponent(s.sticker.pack)}/${encodeURIComponent(s.sticker.file)}" style="max-width:120px;max-height:120px;border-radius:8px" title="${escHtml(s.sticker.tag)}"><div style="font-size:10px;color:var(--text2)">🎭 ${escHtml(s.sticker.pack)} · ${escHtml(s.sticker.tag)}</div></div>` : '';
  const imgs = (s.userImages || []).map(imgId => `<img src="/api/v1/debug/images/${encodeURIComponent(imgId)}" style="max-width:200px;max-height:200px;border-radius:8px;margin:4px">`).join('');
  document.getElementById('selectedPrompt').innerHTML = (s.userText ? escHtml(s.userText) : '') + stickerHtml + (imgs && !s.sticker ? `<div style="margin-top:8px">${imgs}</div>` : '') || '👈 从左侧列表选择一条消息';
  document.getElementById('replyInput').disabled = false;
  document.getElementById('replyInput').value = '';
  document.getElementById('replyInput').focus();
  document.getElementById('btnSend').disabled = false;
  document.getElementById('btnCancel').disabled = false;
  document.getElementById('btnSticker').disabled = false;
  renderSessions();
  // Auto claim session
  sendWs({ type: 'reply.start', requestId: id });
}

function deselectSession() {
  selectedSessionId = null;
  sendingReply = false;
  document.getElementById('selectedId').textContent = '选择一个请求开始回复';
  document.getElementById('selectedPrompt').innerHTML = '👈 从左侧列表选择一条消息';
  document.getElementById('replyInput').disabled = true;
  document.getElementById('replyInput').value = '';
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnSend').textContent = '发送 (Ctrl+Enter)';
  document.getElementById('btnCancel').disabled = true;
  document.getElementById('btnSticker').disabled = true;
  renderSessions();
}

function sendReply() {
  if (!selectedSessionId || sendingReply) return;
  const content = document.getElementById('replyInput').value.trim();
  if (!content) return;
  sendingReply = true;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnSend').textContent = '发送中…';
  sendWs({ type: 'reply.send', requestId: selectedSessionId, content });
  // deselectSession happens when session.completed arrives
}

function cancelReply() {
  if (!selectedSessionId || sendingReply) return;
  sendWs({ type: 'reply.cancel', requestId: selectedSessionId });
  deselectSession();
}

function sendSticker(tag) {
  if (!selectedSessionId || sendingReply) return;
  const t = tag || prompt('输入贴纸标签 (如 "开心"):');
  if (!t) return;
  const pack = stickerPacks.find(p => (p.tags || []).includes(t))?.pack || stickerPacks[0]?.pack;
  if (!pack) { alert('没有可用的贴纸包'); return; }
  const marker = '【sticker:' + pack + ':' + t + '】';
  sendingReply = true;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnSend').textContent = '发送中…';
  sendWs({ type: 'reply.send', requestId: selectedSessionId, content: marker });
}

function quickReply(text) {
  if (!selectedSessionId || sendingReply) return;
  sendingReply = true;
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnSend').textContent = '发送中…';
  sendWs({ type: 'reply.send', requestId: selectedSessionId, content: text });
}

function testTts() {
  const text = document.getElementById('ttsText').value.trim();
  const engine = document.getElementById('ttsEngine').value;
  if (!text) return;
  const params = new URLSearchParams({ engine, text });
  const player = document.getElementById('audioPlayer');
  player.src = `/api/v1/tts/proxy?${params}`;
  player.play().catch(() => showToast('TTS 播放失败'));
}

function addVoiceItem(voice) {
  const div = document.getElementById('voiceList');
  const placeholder = div.querySelector(':scope > .emptyState');
  if (placeholder) placeholder.remove();
  const item = document.createElement('div');
  item.className = 'voiceItem';
  item.innerHTML = `<div style="font-size:10px;color:var(--text2)">${voice.receivedAt ? new Date(voice.receivedAt).toLocaleTimeString() : ''} · ${(voice.size / 1024).toFixed(1)}KB</div><div class="vtext">${escHtml(voice.text)}</div>`;
  // Left-click to play, right-click to download
  item.onclick = () => {
    const player = document.getElementById('audioPlayer');
    player.src = `/api/v1/debug/voices/${encodeURIComponent(voice.id)}/download`;
    player.play().catch(() => showToast('无法播放该音频'));
  };
  item.oncontextmenu = (e) => { e.preventDefault(); window.open(`/api/v1/debug/voices/${encodeURIComponent(voice.id)}/download`, '_blank'); };
  item.title = '点击播放 · 右键下载';
  div.insertBefore(item, div.firstChild);
  if (div.children.length > 20) div.removeChild(div.lastChild);
}

function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;
  if (history.length === 0) {
    container.innerHTML = '<div class="emptyState">暂无</div>';
    return;
  }
  container.innerHTML = history.slice(0, 20).map(s => {
    const age = Math.floor((Date.now() - s.resolvedAt) / 1000);
    const ageStr = age < 60 ? `${age}s前` : `${Math.floor(age / 60)}m前`;
    const statusLabel = s.resolvedStatus === 'timeout' ? '⏱ 超时' : s.resolvedStatus === 'cancelled' ? '✕ 已取消' : '✓ 已回复';
    const statusColor = s.resolvedStatus === 'timeout' ? 'var(--warn)' : s.resolvedStatus === 'cancelled' ? 'var(--accent)' : 'var(--green)';
    return `<div class="sessionCard" style="opacity:0.7;border-color:transparent">
      <div class="userText">${escHtml((s.userText || '(空)').substring(0, 40))}</div>
      <div class="meta">${ageStr} <span style="color:${statusColor}">${statusLabel}</span></div>
    </div>`;
  }).join('');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;top:60px;right:20px;background:var(--surface2);color:var(--text);padding:8px 16px;border-radius:var(--radius);font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s';
  el.textContent = msg;
  document.body.appendChild(el);
  requestAnimationFrame(() => { el.style.opacity = '1'; });
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
}

function dismissAll() {
  if (!confirm('确定忽略全部 ' + sessions.size + ' 个待回复请求吗？')) return;
  sendWs({ type: 'reply.cancelAll' });
}

function sendWs(data) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

function updateStats() {
  document.getElementById('statPending').textContent = sessions.size;
  document.getElementById('statVoices').textContent = document.getElementById('voiceList').children.length;
}

function escHtml(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

document.getElementById('replyInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendReply(); }
});

connect();
</script>
</body>
</html>
